<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <div class="header-container">
            <div class="title-grimoire">
                <h1>Grimorio</h1>
            </div>
        </div>
    </header>

    <section class="section-form">
        <form id="form-container" class="form-container">
            <h2 class="subtitle-grimoire">¡Pon el nombre que tu quieras!</h2>

            <input id="input-form" class="input-form" type="text" placeholder="Escribe el nombre que quieras...">

            <select name="item" id="item-type" class="item-type">
                <option value="pocion">Poción Curativa</option>
                <option value="planta">Planta Medicinal</option>
                <option value="hechizo">Hechizo</option>
                <option value="mineral">Mineral raro</option>
            </select>

            <textarea name="description" id="text-description" class="text-description" placeholder="Deja tu descripción..."></textarea>

            <button type="submit" id="btn-add" class="btn-add">Añadir objeto</button>
        </form>
    </section>

    <section class="grimoire-inventory">
        <ul id="grimoire-list" class="grimoire-list"></ul>
    </section>

    <!-------JAVASCRIPT------->
    <script src="main.js"></script>
</body>
</html>
